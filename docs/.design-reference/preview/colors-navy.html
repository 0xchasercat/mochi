<!doctype html><html><head><meta charset="utf-8"><title>Navy Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:flex;gap:6px}
.sw{flex:1;border-radius:10px;padding:10px;height:88px;display:flex;flex-direction:column;justify-content:flex-end;font-family:JetBrains Mono;font-size:10px}
.sw .n{font-family:Nunito;font-weight:800;font-size:12px}
</style></head>
<body><div class="card" style="height:170px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Navy — primary text & ink</div>
  <div class="row">
    <div class="sw" style="background:#1b2447;color:#fffaf2"><div class="n">900</div><div>#1B2447</div></div>
    <div class="sw" style="background:#232c54;color:#fffaf2"><div class="n">800</div><div>#232C54</div></div>
    <div class="sw" style="background:#2e3866;color:#fffaf2"><div class="n">700</div><div>#2E3866</div></div>
    <div class="sw" style="background:#4a558a;color:#fffaf2"><div class="n">500</div><div>#4A558A</div></div>
    <div class="sw" style="background:#8a93b8;color:#1b2447"><div class="n">300</div><div>#8A93B8</div></div>
  </div>
</div></body></html>
