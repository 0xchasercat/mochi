<!doctype html><html><head><meta charset="utf-8"><title>Honey Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:flex;gap:6px}
.sw{flex:1;border-radius:10px;padding:10px;height:88px;display:flex;flex-direction:column;justify-content:flex-end;font-family:JetBrains Mono;font-size:10px;color:#1b2447}
.sw .n{font-family:Nunito;font-weight:800;font-size:12px}
</style></head>
<body><div class="card" style="height:170px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Honey — accents, links, CTAs</div>
  <div class="row">
    <div class="sw" style="background:#c5791a;color:#fffaf2"><div class="n">600</div><div>#C5791A</div></div>
    <div class="sw" style="background:#e89425"><div class="n">500</div><div>#E89425</div></div>
    <div class="sw" style="background:#f5b65a"><div class="n">400</div><div>#F5B65A</div></div>
    <div class="sw" style="background:#fbdfa6"><div class="n">200</div><div>#FBDFA6</div></div>
    <div class="sw" style="background:#fdf3df;border:1px solid #f3e8d2"><div class="n">50</div><div>#FDF3DF</div></div>
  </div>
</div></body></html>
