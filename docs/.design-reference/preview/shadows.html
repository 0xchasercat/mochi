<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:flex;gap:18px;align-items:center;justify-content:center;padding:14px 0}
.tile{width:96px;height:78px;background:#fff;border-radius:14px;display:flex;align-items:flex-end;justify-content:center;font-family:JetBrains Mono;font-size:10px;color:#4a558a;padding:8px}
</style></head>
<body><div class="card" style="height:180px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Shadows — soft, sticky elevation</div>
  <div class="row">
    <div class="tile" style="box-shadow:0 1px 2px rgba(27,36,71,0.06)">xs</div>
    <div class="tile" style="box-shadow:0 2px 6px rgba(27,36,71,0.08)">sm</div>
    <div class="tile" style="box-shadow:0 6px 18px rgba(27,36,71,0.10)">md</div>
    <div class="tile" style="box-shadow:0 18px 40px rgba(27,36,71,0.14)">lg</div>
    <div class="tile" style="box-shadow:0 8px 24px rgba(232,148,37,0.30)">honey</div>
    <div class="tile" style="box-shadow:inset 0 -3px 0 rgba(27,36,71,0.08);border:1px solid #e6d6b6">inset</div>
  </div>
</div></body></html>
