<!doctype html><html><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.box{border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:6px;border:1px solid}
.box .label{font-family:Nunito;font-weight:800;font-size:14px;letter-spacing:-0.01em}
.box .nick{font-family:JetBrains Mono;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;opacity:0.8}
.box .hex{font-family:JetBrains Mono;font-size:11px}
</style></head>
<body><div class="card" style="height:170px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Semantic — food nicknames, semantic tokens</div>
  <div class="row">
    <div class="box" style="background:#e4f3ea;border-color:#3f9d6b;color:#1b2447"><div class="nick">— matcha</div><div class="label">Success</div><div class="hex">#3F9D6B</div></div>
    <div class="box" style="background:#fdf3df;border-color:#e89425;color:#1b2447"><div class="nick">— honey</div><div class="label">Warning</div><div class="hex">#E89425</div></div>
    <div class="box" style="background:#fbe3e4;border-color:#d24a52;color:#1b2447"><div class="nick">— strawberry</div><div class="label">Danger</div><div class="hex">#D24A52</div></div>
    <div class="box" style="background:#e5edf9;border-color:#4f7bc4;color:#1b2447"><div class="nick">— blueberry</div><div class="label">Info</div><div class="hex">#4F7BC4</div></div>
  </div>
</div></body></html>
