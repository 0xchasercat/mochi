<!doctype html><html><head><meta charset="utf-8"><title>Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.field{display:flex;flex-direction:column;gap:6px}
.label{font-family:Inter;font-weight:600;font-size:13px;color:#1b2447}
.input{font-family:Inter;font-size:15px;padding:11px 14px;border-radius:14px;border:1px solid #e6d6b6;background:#fff;color:#1b2447;outline:none}
.input:focus{border-color:#f5b65a;box-shadow:0 0 0 3px rgba(245,182,90,0.30)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
</style></head>
<body><div class="card" style="height:280px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Form Inputs</div>
  <div class="row">
    <div class="field"><label class="label">Profile</label><input class="input" value="mac-safari-17"></div>
    <div class="field"><label class="label">Seed</label><input class="input" placeholder="random"></div>
    <div class="field"><label class="label">Proxy URL</label><input class="input" style="border-color:#f5b65a;box-shadow:0 0 0 3px rgba(245,182,90,0.30)" value="http://us-east.mochi.proxy:443"></div>
    <div class="field"><label class="label">Headless</label>
      <select class="input"><option>true (--headless=new)</option><option>false</option></select>
    </div>
  </div>
</div></body></html>
