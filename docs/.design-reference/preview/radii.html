<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:flex;gap:14px;align-items:flex-end}
.box{background:#fbf3e4;border:1px solid #e6d6b6;width:88px;height:88px;display:flex;align-items:flex-end;justify-content:center;font-family:JetBrains Mono;font-size:10px;color:#4a558a;padding:8px}
</style></head>
<body><div class="card" style="height:200px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Radii — squishy by default</div>
  <div class="row">
    <div class="box" style="border-radius:6px">xs 6</div>
    <div class="box" style="border-radius:10px">sm 10</div>
    <div class="box" style="border-radius:14px">md 14</div>
    <div class="box" style="border-radius:20px">lg 20</div>
    <div class="box" style="border-radius:28px">xl 28</div>
    <div class="box" style="border-radius:999px">pill</div>
    <div class="box" style="border-radius:64% 36% 58% 42% / 52% 48% 52% 48%">blob</div>
  </div>
</div></body></html>
