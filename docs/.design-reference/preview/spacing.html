<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>.bar{background:#e89425;border-radius:6px;height:14px}.row{display:flex;align-items:center;gap:14px;font-family:JetBrains Mono;font-size:11px;color:#4a558a}</style>
</head>
<body><div class="card" style="height:280px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Spacing — 4px base grid</div>
  <div class="row"><span style="width:48px">--s-1</span><div class="bar" style="width:4px"></div><span>4</span></div>
  <div class="row"><span style="width:48px">--s-2</span><div class="bar" style="width:8px"></div><span>8</span></div>
  <div class="row"><span style="width:48px">--s-3</span><div class="bar" style="width:12px"></div><span>12</span></div>
  <div class="row"><span style="width:48px">--s-4</span><div class="bar" style="width:16px"></div><span>16</span></div>
  <div class="row"><span style="width:48px">--s-6</span><div class="bar" style="width:24px"></div><span>24</span></div>
  <div class="row"><span style="width:48px">--s-8</span><div class="bar" style="width:32px"></div><span>32</span></div>
  <div class="row"><span style="width:48px">--s-12</span><div class="bar" style="width:48px"></div><span>48</span></div>
  <div class="row"><span style="width:48px">--s-20</span><div class="bar" style="width:80px"></div><span>80</span></div>
</div></body></html>
