<!doctype html><html><head><meta charset="utf-8"><title>Badges & Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{font-family:JetBrains Mono;font-size:11px;padding:4px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;letter-spacing:0.02em}
.dot{width:6px;height:6px;border-radius:50%}
</style></head>
<body><div class="card" style="height:220px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Badges &amp; Chips</div>
  <div class="row">
    <span class="chip" style="background:#e4f3ea;color:#1b2447"><span class="dot" style="background:#3f9d6b"></span>passing</span>
    <span class="chip" style="background:#fdf3df;color:#1b2447"><span class="dot" style="background:#e89425"></span>flagged</span>
    <span class="chip" style="background:#fbe3e4;color:#1b2447"><span class="dot" style="background:#d24a52"></span>blocked</span>
    <span class="chip" style="background:#e5edf9;color:#1b2447"><span class="dot" style="background:#4f7bc4"></span>info</span>
    <span class="chip" style="background:#1b2447;color:#fdf3df">v0.4.2-alpha</span>
    <span class="chip" style="background:#fbf3e4;color:#1b2447;border:1px solid #e6d6b6">bun ≥ 1.1</span>
  </div>
  <div class="row">
    <span class="chip" style="background:#11141c;color:#f5b65a">stealth-mode: on</span>
    <span class="chip" style="background:#11141c;color:#7dcb9a">JA4: spoofed</span>
    <span class="chip" style="background:#11141c;color:#8db1ea">profile: mac-safari-17</span>
    <span class="chip" style="background:#11141c;color:#ece6d6">seed: 0xb3a1</span>
  </div>
  <div style="font-family:Inter;font-size:12px;color:#8a93b8">Light chips on cream, dark chips on stealth surfaces. No pure-color fills.</div>
</div></body></html>
