<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.icons{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.iwrap{display:flex;flex-direction:column;align-items:center;gap:6px;font-family:JetBrains Mono;font-size:10px;color:#8a93b8}
.iwrap .ic{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#1b2447}
.tot{font-size:34px}
</style></head>
<body><div class="card" style="height:280px">
  <div style="font-family:JetBrains Mono;font-size:11px;letter-spacing:0.08em;color:#c5791a;text-transform:uppercase">Iconography — Lucide for UI · Totem emoji for pillars</div>
  <div class="icons">
    <div class="iwrap"><div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></div><div>search</div></div>
    <div class="iwrap"><div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div><div>menu</div></div>
    <div class="iwrap"><div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></div><div>chevron</div></div>
    <div class="iwrap"><div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m4 8 8-5 8 5v8l-8 5-8-5z"/></svg></div><div>package</div></div>
    <div class="iwrap"><div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div><div>arrow</div></div>
    <div class="iwrap"><div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></div><div>clock</div></div>
    <div class="iwrap" style="border-left:1px solid #e6d6b6;padding-left:18px"><div class="tot">🍡</div><div>dango</div></div>
    <div class="iwrap"><div class="tot">🧬</div><div>helix</div></div>
    <div class="iwrap"><div class="tot">🦀</div><div>crab</div></div>
    <div class="iwrap"><div class="tot">👻</div><div>ghost</div></div>
    <div class="iwrap"><div class="tot">🎯</div><div>bullseye</div></div>
  </div>
  <div style="font-family:Inter;font-size:12px;color:#8a93b8">Lucide stroke 1.75, currentColor. Totems are reserved for the five pillars and the README.</div>
</div></body></html>
