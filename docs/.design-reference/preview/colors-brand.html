<!doctype html><html><head><meta charset="utf-8"><title>Brand Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.row{display:flex;gap:10px}
.sw{flex:1;border-radius:14px;padding:14px;height:120px;display:flex;flex-direction:column;justify-content:flex-end;font-family:JetBrains Mono;font-size:11px}
.sw .n{font-family:Nunito;font-weight:800;font-size:14px;letter-spacing:-0.01em}
.sw .h{opacity:0.8;font-size:10px;margin-top:2px}
</style></head>
<body><div class="card" style="height:200px">
  <div class="row">
    <div class="sw" style="background:#1b2447;color:#fffaf2;border:1px solid #1b2447"><div class="n">Navy 900</div><div class="h">#1B2447</div></div>
    <div class="sw" style="background:#e89425;color:#1b2447"><div class="n">Honey 500</div><div class="h">#E89425</div></div>
    <div class="sw" style="background:#fbf3e4;color:#1b2447;border:1px solid #e6d6b6"><div class="n">Cream 100</div><div class="h">#FBF3E4</div></div>
    <div class="sw" style="background:#f6c2bf;color:#1b2447"><div class="n">Blush</div><div class="h">#F6C2BF</div></div>
    <div class="sw" style="background:#11141c;color:#ece6d6"><div class="n">Stealth 900</div><div class="h">#11141C</div></div>
  </div>
</div></body></html>
