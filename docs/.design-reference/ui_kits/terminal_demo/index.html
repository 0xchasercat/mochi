<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>mochi.js — terminal demo</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="TerminalWindow.jsx"></script>
<script type="text/babel" src="Prompt.jsx"></script>
<script type="text/babel" src="Output.jsx"></script>
<script type="text/babel" src="MochiBanner.jsx"></script>

<script type="text/babel">
const FP_ROWS = [
  ["profile",       "mac-safari-17", true],
  ["seed",          "0xb3a1", true],
  ["webgl.renderer","Apple GPU", true],
  ["audio.hash",    "f3:91:cc:2a", true],
  ["canvas.noise",  "Δ 0.0021", true],
  ["navigator.ua",  "Mozilla/5.0 (Macintosh; …) Safari/17.4", true],
  ["JA4",           "t13d1517h2_8daaf6152771_b1ff8ab2d16f", true],
];

function Demo() {
  const [step, setStep] = React.useState(0);
  React.useEffect(() => {
    if (step >= 7) return;
    const t = setTimeout(() => setStep(s => s + 1), step === 0 ? 600 : 750);
    return () => clearTimeout(t);
  }, [step]);

  return (
    <div className="t-stage">
      <header className="t-stage-head">
        <span className="m-wordmark-sm">mochi<span className="m-dot"></span>js</span>
        <span style={{fontFamily: 'var(--font-mono)', fontSize: 12, color: '#9aa0b3'}}>· terminal · v0.4.2</span>
        <span className="t-eyebrow">stealth session</span>
      </header>

      <div className="t-side">
        <TerminalWindow>
          <Prompt cmd="bun add mochi" typed={false} />
          {step >= 1 && <Log kind="success">added <strong>mochi@0.4.2</strong> · <span className="t-tok-com">2 packages, 0.18s</span></Log>}

          {step >= 2 && <Prompt cmd="mochi --hello" typed={false} />}
          {step >= 2 && <MochiBanner />}

          {step >= 3 && <Prompt cmd="bun run scrape.ts --profile mac-safari-17 --seed 0xb3a1" typed={false} />}
          {step >= 4 && <>
            <Log kind="info">opening CDP pipe <span className="t-tok-com">(fd=14, fd=15)</span> · <Chip kind="info">latency 0.31ms</Chip></Log>
            <Log kind="info">injecting <strong>Profile Matrix</strong> into V8 isolate <span className="t-tok-com">/* TurboFan-friendly */</span></Log>
            <Log kind="warn">spawning rust-tls bridge via <code>bun:ffi</code> · JA4 spoof: <strong>safari/17.4</strong></Log>
          </>}

          {step >= 5 && <Fingerprint rows={FP_ROWS} />}

          {step >= 6 && <>
            <Log kind="success">page.goto(<span className="t-tok-str">"https://target.example/checkout"</span>) <Chip kind="success">200 ok</Chip></Log>
            <Log kind="success">DataDome challenge: <strong>passed</strong> <Chip kind="success">jitter 0.0008ms</Chip></Log>
            <Log kind="success">Turnstile: <strong>passed</strong> <Chip kind="success">behavior coherent</Chip></Log>
          </>}

          {step >= 7 && <>
            <Log kind="muted">────────────────────────────────────────</Log>
            <Log kind="success"><strong>session complete</strong> · 1 page, 12 actions, 0 detections · <Chip kind="honey">leaves no crumbs 🍡</Chip></Log>
            <Prompt cmd="" typed={true} />
          </>}
        </TerminalWindow>

        <aside className="t-meter">
          <div className="t-meter-head">
            <span className="t-meter-h">stealth meter</span>
            <Chip kind={step >= 5 ? "success" : "warn"}>{step >= 5 ? "locked" : "warming"}</Chip>
          </div>
          <div className="t-meter-row">
            <span className="t-meter-label">CDP latency</span>
            <span className="t-meter-val">0.31ms</span>
          </div>
          <div className="t-meter-bar"><div className="t-meter-bar-fill" style={{width: '12%'}}></div></div>
          <div className="t-meter-divider"></div>

          <div className="t-meter-row">
            <span className="t-meter-label">JIT jitter</span>
            <span className="t-meter-val">0.0008ms</span>
          </div>
          <div className="t-meter-bar"><div className="t-meter-bar-fill" style={{width: '4%'}}></div></div>
          <div className="t-meter-divider"></div>

          <div className="t-meter-row">
            <span className="t-meter-label">FP coherence</span>
            <span className="t-meter-val">{step >= 5 ? '100%' : '—'}</span>
          </div>
          <div className="t-meter-bar"><div className="t-meter-bar-fill" style={{width: step >= 5 ? '100%' : '0%', transition: 'width .8s var(--ease-out)'}}></div></div>
          <div className="t-meter-divider"></div>

          <div className="t-meter-row">
            <span className="t-meter-label">Open ports</span>
            <span className="t-meter-val">0</span>
          </div>
          <div className="t-meter-row">
            <span className="t-meter-label">Profile</span>
            <span className="t-meter-val" style={{color: 'var(--mochi-honey-400)'}}>mac-safari-17</span>
          </div>

          <div className="t-controls">
            <button className="t-btn t-btn-primary" onClick={() => setStep(0)}>↻ replay</button>
            <button className="t-btn" onClick={() => setStep(7)}>skip</button>
          </div>
        </aside>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
