<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>mochi.js docs</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="pages/Home.jsx"></script>
<script type="text/babel" src="pages/GettingStarted.jsx"></script>
<script type="text/babel" src="pages/Consistency.jsx"></script>
<script type="text/babel" src="pages/Profiles.jsx"></script>
<script type="text/babel" src="pages/Guides.jsx"></script>

<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState(() => location.hash.replace(/^#/, '') || "getting-started");
  const [theme, setTheme] = React.useState("light");
  const [searchOpen, setSearchOpen] = React.useState(false);
  const [tocItems, setTocItems] = React.useState([]);
  const [activeHash, setActiveHash] = React.useState("");

  const navigate = React.useCallback((id) => {
    setRoute(id);
    history.replaceState(null, '', '#' + id);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, []);

  // ⌘K / Ctrl-K to open search
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault(); setSearchOpen(o => !o);
      }
      if (e.key === '/' && !searchOpen && document.activeElement === document.body) {
        e.preventDefault(); setSearchOpen(true);
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [searchOpen]);

  // Track active TOC item via scroll
  React.useEffect(() => {
    const onScroll = () => {
      let active = "";
      for (const it of tocItems) {
        const el = document.getElementById(it.id);
        if (el && el.getBoundingClientRect().top < 120) active = it.id;
      }
      setActiveHash(active);
    };
    document.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => document.removeEventListener('scroll', onScroll);
  }, [tocItems]);

  const toggleTheme = () => {
    const next = theme === "stealth" ? "light" : "stealth";
    setTheme(next);
    if (next === "stealth") document.documentElement.setAttribute("data-theme", "stealth");
    else document.documentElement.removeAttribute("data-theme");
  };

  // Map route -> page component + default toc
  const pageProps = { navigate, registerToc: setTocItems };
  let page;
  switch (route) {
    case "home":              page = <PageHome {...pageProps} />; break;
    case "getting-started":   page = <PageGettingStarted {...pageProps} />; break;
    case "first-script":      page = <PageGettingStarted {...pageProps} />; break;
    case "consistency-engine":page = <PageConsistency {...pageProps} />; break;
    case "profiles":          page = <PageProfiles {...pageProps} />; break;
    case "guides":            page = <PageGuides {...pageProps} />; break;
    default:                  page = <PageGettingStarted {...pageProps} />; break;
  }

  // Reset toc on route change for pages that don't register
  React.useEffect(() => {
    if (route === "home" || route === "guides") setTocItems(route === "guides" ? [
      { id: "starter", label: "Starter" }, { id: "checkout", label: "Checkout flows" },
      { id: "scrape", label: "Scraping" }, { id: "qa", label: "QA & monitoring" }
    ] : [{ id: "start-here", label: "Start here" }, { id: "popular", label: "Popular" }]);
  }, [route]);

  return (
    <>
      <TopNav route={route} navigate={navigate} openSearch={() => setSearchOpen(true)} theme={theme} toggleTheme={toggleTheme} />
      <div className="d-shell">
        <Sidebar route={route} navigate={navigate} />
        {page}
        <Toc items={tocItems} active={activeHash} />
      </div>
      <SearchModal open={searchOpen} onClose={() => setSearchOpen(false)} navigate={navigate} />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
