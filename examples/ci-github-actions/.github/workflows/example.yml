# Reference workflow for running mochi inside GitHub Actions.
#
# Pairs with the recipe at:
#   https://mochijs.com/docs/guides/recipe-ci-github-actions
#
# Targets `runs-on: ubuntu-latest` for portability — mochi's own self-hosted
# chaser-runner pool uses the same shape with a different `runs-on:` label.

name: example
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache mochi browsers
        uses: actions/cache@v4
        with:
          path: ~/.mochi/browsers
          # Bump the suffix when @mochi.js/core floors a new CfT.
          key: mochi-browsers-${{ runner.os }}-v1

      - name: Install Chromium runtime deps
        # ubuntu 24.04: libasound2t64. ubuntu 22.04 and earlier: libasound2.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64 libatspi2.0-0

      - name: Install Chromium-for-Testing
        run: bun install && bunx mochi browsers install

      - name: Run scrape
        env:
          # mochi auto-adds --no-sandbox under root + Linux. The runner is
          # rootless so the flag isn't strictly needed; kept here as the
          # documented escape hatch.
          MOCHI_EXTRA_ARGS: "--no-sandbox"
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          mkdir -p out
          bun run index.ts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-${{ github.run_id }}
          path: out/
