name: PR fast

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TS — typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test

  rust:
    name: Rust — build cdylib + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build cdylib
        run: cargo build --release --manifest-path packages/net-rs/Cargo.toml
      - name: Test
        run: cargo test --manifest-path packages/net-rs/Cargo.toml
