name: PR fast

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TS — typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Contract tests
        run: bun run test:contract
      # Harness smoke gate — Phase 0.5 deliverable. Drives a Mochi-spoofed
      # session through tests/fixtures/probe-page.html, normalizes both sides,
      # and structurally diffs against each profile's committed baseline.
      # PR-blocking metric is `counts.material === 0` (PLAN.md §13.6).
      #
      # SOFT-FAIL at v0.5 — we ship the harness mechanics here, not the full
      # phase-0.7 consistency coverage. Many surfaces (audio bytes, full
      # canvas, full WebGL extensions, media-devices, speech voices) are
      # legitimately deferred and tracked in expected-divergences.json. The
      # warning becomes a hard-fail at the end of phase 0.7 once the 80-rule
      # consistency engine lands. tasks/0050-harness-mvp.md.
      - name: Harness smoke (soft-fail at v0.5)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          MOCHI_E2E: "1"
        run: |
          set -u
          if ! bun run harness:smoke; then
            echo "::warning title=Harness smoke divergence::bun harness:smoke produced material divergences. Soft-fail at v0.5; will hard-fail when phase 0.7 (full consistency) lands. See tasks/0050-harness-mvp.md and the per-profile expected-divergences.json."
          else
            echo "Harness smoke OK — Zero-Diff against committed baselines."
          fi
      # Conformance gates — phase 0.5.x (tasks 0140 + 0150).
      # Mochi-native ports of CloakHQ/CloakBrowser tests/test_stealth.py
      # (webdriver detection — fingerprint-spoofing surface) and
      # tests/test_humanize_unit.mjs + test_human_visual.mjs (behavioral
      # synth — Bezier shape, keystroke timing, fill clearing, trajectory).
      #
      # Both HARD-FAIL the PR — per PLAN.md I-7 the harness is the gate.
      # The release workflow additionally gates on the online layers
      # (MOCHI_ONLINE=1) before publish.
      - name: Stealth conformance — Layer 1 (offline)
        if: github.event_name == 'pull_request'
        env:
          MOCHI_E2E: "1"
        run: bun run conformance:stealth

      - name: Humanize conformance (offline)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          MOCHI_E2E: "1"
        run: bun run conformance:humanize
      # Soft-fail at v0.0 — most early infra PRs don't ship user-visible surface,
      # so a missing changeset is a warning, not a build failure. Flip to hard-fail
      # when phase 0.1 (CDP transport) lands per tasks/0004-changesets.md.
      - name: Changeset status (soft-fail at v0.0)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -u
          # Files changed in this PR
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          # Did the PR touch any package source?
          touched_src=$(printf '%s\n' "$changed" | grep -E '^packages/[^/]+/src/' || true)
          # Did the PR add any new changeset entry (excluding README/config)?
          added_changeset=$(printf '%s\n' "$changed" \
            | grep -E '^\.changeset/.+\.md$' \
            | grep -v -E '^\.changeset/README\.md$' || true)

          if [ -n "$touched_src" ] && [ -z "$added_changeset" ]; then
            echo "::warning title=Missing changeset::This PR modifies packages/*/src/** but adds no .changeset/*.md entry. Run 'bun changeset' before merge. Soft-fail at v0.0; will hard-fail when phase 0.1 surface lands."
          else
            echo "Changeset check OK (touched_src=$( [ -n \"$touched_src\" ] && echo yes || echo no ), added_changeset=$( [ -n \"$added_changeset\" ] && echo yes || echo no ))."
          fi

          # Also exercise the changesets CLI so a broken config fails fast.
          bunx --bun @changesets/cli status || echo "::warning::changeset status returned non-zero (soft-fail at v0.0)"

  rust:
    name: Rust — build cdylib + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build cdylib
        run: cargo build --release --manifest-path packages/net-rs/Cargo.toml
      - name: Test
        run: cargo test --manifest-path packages/net-rs/Cargo.toml
