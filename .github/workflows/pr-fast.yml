name: PR fast

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TS — typecheck + lint + test
    # Self-hosted bare-metal runner (chaser-runner — 9950X3D / NVMe gen5 /
    # 128 GB DDR5). Keeps PR-fast tight; the matrix-OS prebuilds in
    # build-prebuilds.yml stay on GitHub-hosted because the chaser-runner is
    # Linux/x64 only and prebuilds need mac + win + arm.
    # NOTE: until this repo goes public, fork-PR risk doesn't apply. When
    # we open-source, gate self-hosted with `if: github.event.pull_request.head.repo.full_name == github.repository`
    # (or split into a "trusted" workflow that only fires post-approval).
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Contract tests
        run: bun run test:contract
      # Cache + install Chromium-for-Testing so the MOCHI_E2E-gated steps
      # below (harness:smoke, conformance:stealth, conformance:humanize)
      # have a real binary to drive. Dogfoods `mochi browsers install` —
      # if it breaks on Linux CI, we want to know in PR-fast, not nightly.
      - name: Cache Chromium-for-Testing
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: ~/.mochi/browsers
          key: chromium-for-testing-linux-${{ runner.os }}-v1
      # System deps Chromium needs to actually launch on Linux. CfT ships
      # only the binary, not the .deb dep tree, so the bare Ubuntu runner
      # is missing libs (libnss3, libgbm1, libcups2, libgtk-3, libpango,
      # libasound2, ...). Without these `chrome --headless=new` starts then
      # immediately crashes (no descriptive error — the parent process just
      # sees the pipe close → mochi reports BrowserCrashedError). List below
      # mirrors Playwright's `install-deps` for chromium on Ubuntu.
      - name: Install Chromium runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 \
            libatk1.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 \
            libgbm1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 \
            libpangocairo-1.0-0 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 \
            libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 \
            libxrender1 libxss1 libxtst6 xdg-utils
      # Always run install — idempotent (no-op if already installed; ~1s on
      # cache hit, real download on miss). Robust against cache-corruption.
      - name: Install Chromium-for-Testing (mochi browsers install — idempotent)
        run: bun packages/cli/src/bin.ts browsers install
      # Resolve the Chromium binary path via plain `find` and export to
      # MOCHI_CHROMIUM_PATH. We tried having @mochi.js/core lazy-import
      # @mochi.js/cli's resolveChromiumBinary but that path silently returns
      # null in CI for reasons that aren't yet diagnosed (cache-restore
      # layout vs cli scan mismatch). Setting MOCHI_CHROMIUM_PATH directly
      # short-circuits the cli resolver entirely — robust and explicit.
      # Anyone debugging future cache issues just needs to look at the
      # `find` output below.
      - name: Resolve Chromium binary path
        run: |
          set -euo pipefail
          BINARY=$(find ~/.mochi/browsers -type f -name chrome -perm -u+x 2>/dev/null | head -1 || true)
          if [ -z "$BINARY" ]; then
            echo "::error::No Chromium binary found under ~/.mochi/browsers/. Tree:"
            find ~/.mochi/browsers -maxdepth 4 -type f 2>/dev/null | head -20 || echo "(missing)"
            ls -la ~/.mochi/browsers/ 2>/dev/null || true
            exit 1
          fi
          echo "Found Chromium at: $BINARY"
          echo "MOCHI_CHROMIUM_PATH=$BINARY" >> "$GITHUB_ENV"
          # Smoke: can the binary even start? If --version fails, the apt-install
          # above is missing a library and conformance will silently
          # BrowserCrashedError. This step gives us a clear, isolated error.
          echo "::group::Chromium --version smoke"
          "$BINARY" --version
          echo "::endgroup::"
      # Harness smoke gate — Phase 0.5 deliverable. Drives a Mochi-spoofed
      # session through tests/fixtures/probe-page.html, normalizes both sides,
      # and structurally diffs against each profile's committed baseline.
      # PR-blocking metric is `counts.material === 0` (PLAN.md §13.6).
      #
      # SOFT-FAIL at v0.5 — we ship the harness mechanics here, not the full
      # phase-0.7 consistency coverage. Many surfaces (audio bytes, full
      # canvas, full WebGL extensions, media-devices, speech voices) are
      # legitimately deferred and tracked in expected-divergences.json. The
      # warning becomes a hard-fail at the end of phase 0.7 once the 80-rule
      # consistency engine lands. tasks/0050-harness-mvp.md.
      - name: Harness smoke (soft-fail at v0.5)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          MOCHI_E2E: "1"
          MOCHI_EXTRA_ARGS: "--no-sandbox"
        run: |
          set -u
          if ! bun run harness:smoke; then
            echo "::warning title=Harness smoke divergence::bun harness:smoke produced material divergences. Soft-fail at v0.5; will hard-fail when phase 0.7 (full consistency) lands. See tasks/0050-harness-mvp.md and the per-profile expected-divergences.json."
          else
            echo "Harness smoke OK — Zero-Diff against committed baselines."
          fi
      # Conformance gates — phase 0.5.x (tasks 0140 + 0150).
      # Mochi-native ports of CloakHQ/CloakBrowser tests/test_stealth.py
      # (webdriver detection — fingerprint-spoofing surface) and
      # tests/test_humanize_unit.mjs + test_human_visual.mjs (behavioral
      # synth — Bezier shape, keystroke timing, fill clearing, trajectory).
      #
      # Both HARD-FAIL the PR — per PLAN.md I-7 the harness is the gate.
      # The release workflow additionally gates on the online layers
      # (MOCHI_ONLINE=1) before publish.
      - name: Stealth conformance — Layer 1 (offline)
        if: github.event_name == 'pull_request'
        env:
          MOCHI_E2E: "1"
          # Linux user-namespace sandbox doesn't work in GH Actions runners
          # (unprivileged container). --no-sandbox is the canonical CI workaround;
          # PLAN.md §8.6 explicitly omits it from DEFAULT_CHROMIUM_FLAGS in
          # production because it's a fingerprint leak — but the conformance
          # suite tests "does mochi work mechanically", not "does this look
          # like a real user". Different concern.
          MOCHI_EXTRA_ARGS: "--no-sandbox"
        run: bun run conformance:stealth

      # Layer 2 (online) mirrors release.yml so PRs catch IP / proxy /
      # incolumitas regressions before merge — task 0160. Same env shape +
      # residential proxy from secrets.HTTP_PROXY. Empty secret is OK
      # (fork PRs); the harness skips the proxy in that case.
      - name: Stealth conformance — Layer 2 (online)
        if: github.event_name == 'pull_request'
        env:
          MOCHI_E2E: "1"
          MOCHI_ONLINE: "1"
          MOCHI_EXTRA_ARGS: "--no-sandbox"
          # Residential proxy — see release.yml. NEVER echo this value.
          MOCHI_PROXY: ${{ secrets.HTTP_PROXY }}
        run: bun run conformance:stealth:online

      - name: Humanize conformance (offline)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          MOCHI_E2E: "1"
          MOCHI_EXTRA_ARGS: "--no-sandbox"
        run: bun run conformance:humanize
      # Soft-fail at v0.0 — most early infra PRs don't ship user-visible surface,
      # so a missing changeset is a warning, not a build failure. Flip to hard-fail
      # when phase 0.1 (CDP transport) lands per tasks/0004-changesets.md.
      - name: Changeset status (soft-fail at v0.0)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -u
          # Files changed in this PR
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          # Did the PR touch any package source?
          touched_src=$(printf '%s\n' "$changed" | grep -E '^packages/[^/]+/src/' || true)
          # Did the PR add any new changeset entry (excluding README/config)?
          added_changeset=$(printf '%s\n' "$changed" \
            | grep -E '^\.changeset/.+\.md$' \
            | grep -v -E '^\.changeset/README\.md$' || true)

          if [ -n "$touched_src" ] && [ -z "$added_changeset" ]; then
            echo "::warning title=Missing changeset::This PR modifies packages/*/src/** but adds no .changeset/*.md entry. Run 'bun changeset' before merge. Soft-fail at v0.0; will hard-fail when phase 0.1 surface lands."
          else
            echo "Changeset check OK (touched_src=$( [ -n \"$touched_src\" ] && echo yes || echo no ), added_changeset=$( [ -n \"$added_changeset\" ] && echo yes || echo no ))."
          fi

          # Also exercise the changesets CLI so a broken config fails fast.
          bunx --bun @changesets/cli status || echo "::warning::changeset status returned non-zero (soft-fail at v0.0)"

  rust:
    name: Rust — build cdylib + test
    # Same chaser-runner. Cargo + Rust toolchain caches persist across runs
    # on the self-hosted runner, so a warm cdylib build is sub-second vs.
    # ~30s on ubuntu-latest. dtolnay/rust-toolchain@stable is idempotent.
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build cdylib
        run: cargo build --release --manifest-path packages/net-rs/Cargo.toml
      - name: Test
        run: cargo test --manifest-path packages/net-rs/Cargo.toml
