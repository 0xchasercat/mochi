# Build the @mochi.js/net-rs cdylib for the 5 supported platforms and
# attach the binaries (+ .sha256 sidecars) as assets on the GitHub Release
# created by the changesets publish job (release.yml).
#
# Triggers:
#   - release: { types: [published] } — runs the full 5-platform matrix
#     when a new tag is released. Tag shape per Changesets:
#     `@mochi.js/net-rs@<version>`. We only act when the release tag
#     names @mochi.js/net-rs (other package tags are no-ops).
#   - workflow_dispatch — manual rebuild against an existing tag
#     (rerun-on-failure escape hatch).
#   - pull_request paths-filtered to this workflow file only — runs
#     ONE matrix entry (darwin-arm64) so PRs that touch the workflow
#     itself get sanity-checked without paying the full 5-platform cost.
#
# Cross-compile strategy:
#   - macOS arm64 + x64: native targets on macos-latest. The runner is
#     arm64 by default; the x64 leg uses `--target x86_64-apple-darwin`
#     and links against the bundled SDK (Apple ships universal SDK on
#     macos-13+).
#   - Linux x64: native on ubuntu-latest.
#   - Linux arm64: NATIVE on `ubuntu-24.04-arm` (GitHub-hosted public arm64
#     runner — free tier since Jan 2025). Cross-compile via cargo-zigbuild
#     was tried first but boring-sys2 (BoringSSL transitive dep of wreq) has
#     a perlasm-driven build script that doesn't accept zig as the C
#     compiler — it tries to apply arch-specific patches and fails the build
#     script. Native arm64 build sidesteps the problem entirely; no
#     Docker, no zig, no env-var dance with BORING_BSSL_PATH.
#     The `use_zigbuild` matrix flag is left in place but unused on the
#     linux-arm64 row in case a future native compile breaks and we need
#     to fall back.
#   - Windows x64: native on windows-latest.

name: Build prebuilds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to attach assets to (e.g. @mochi.js/net-rs@0.1.0)"
        required: true
        type: string
  pull_request:
    # PR sanity-build only when the workflow itself OR the build inputs
    # change. Keeps cost low (one matrix entry on PR — see the guard step
    # below) while still catching regressions before they hit a release.
    paths:
      - ".github/workflows/build-prebuilds.yml"
      - "packages/net-rs/Cargo.toml"
      - "packages/net-rs/src/**"
      - "packages/net-rs/scripts/install-prebuild.ts"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

permissions:
  contents: write # required for `softprops/action-gh-release` upload step

concurrency:
  group: build-prebuilds-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # On `release` events, only run when the release tag names @mochi.js/net-rs.
    # Other per-package tags (e.g. @mochi.js/core@…) trigger this workflow too;
    # the guard makes those runs no-ops without burning matrix time.
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, '@mochi.js/net-rs@')
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            rust_target: aarch64-apple-darwin
            os: macos-latest
            ext: dylib
            cargo_artifact: libmochi_net.dylib
          - target: darwin-x64
            rust_target: x86_64-apple-darwin
            os: macos-latest
            ext: dylib
            cargo_artifact: libmochi_net.dylib
          - target: linux-x64
            rust_target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: so
            cargo_artifact: libmochi_net.so
            use_zigbuild: false
          - target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm   # native arm64 runner; no cross-compile.
            ext: so
            cargo_artifact: libmochi_net.so
            use_zigbuild: false    # native = boring-sys2 builds cleanly.
          - target: windows-x64
            rust_target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: dll
            # Cargo on Windows emits `mochi_net.dll` (no `lib` prefix).
            cargo_artifact: mochi_net.dll
    steps:
      - uses: actions/checkout@v4

      # On PR runs we only want one matrix entry to actually build (cost
      # control). The trick: skip every job step except checkout when this
      # is a PR AND the matrix entry isn't darwin-arm64. A plain
      # `if: matrix.target == 'darwin-arm64'` on the job would skip all
      # other entries entirely, which is what we want. We hoist that into
      # a top-level guard via env+if on each step rather than the job, so
      # the matrix UI still shows the skipped legs.
      - name: PR fast-path guard
        id: guard
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ matrix.target }}" != "darwin-arm64" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.target }} on PR (full matrix runs only on release)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust toolchain
        if: steps.guard.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Bun (for sha256 helper)
        if: steps.guard.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install zig + cargo-zigbuild (linux-arm64 only)
        if: steps.guard.outputs.skip != 'true' && matrix.use_zigbuild == true
        run: |
          set -euo pipefail
          # Install zig (apt's version lags; use the official tarball).
          ZIG_VERSION="0.13.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          mkdir -p "$HOME/.local/zig"
          tar -xJf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
          echo "$HOME/.local/zig" >> "$GITHUB_PATH"
          cargo install --locked cargo-zigbuild

      - name: Cache cargo
        if: steps.guard.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Build cdylib (cargo)
        if: steps.guard.outputs.skip != 'true' && matrix.use_zigbuild != true
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release \
            --manifest-path packages/net-rs/Cargo.toml \
            --target ${{ matrix.rust_target }}

      - name: Build cdylib (cargo-zigbuild)
        if: steps.guard.outputs.skip != 'true' && matrix.use_zigbuild == true
        shell: bash
        run: |
          set -euo pipefail
          cargo zigbuild --release \
            --manifest-path packages/net-rs/Cargo.toml \
            --target ${{ matrix.rust_target }}

      - name: Stage artifact (POSIX)
        if: steps.guard.outputs.skip != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          OUT_NAME="mochi_net-${{ matrix.target }}.${{ matrix.ext }}"
          SRC="target/${{ matrix.rust_target }}/release/${{ matrix.cargo_artifact }}"
          mkdir -p prebuild-out
          cp "$SRC" "prebuild-out/$OUT_NAME"
          ( cd prebuild-out && shasum -a 256 "$OUT_NAME" > "$OUT_NAME.sha256" )
          ls -la prebuild-out/

      - name: Stage artifact (Windows)
        if: steps.guard.outputs.skip != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $outName = "mochi_net-${{ matrix.target }}.${{ matrix.ext }}"
          $src = "target/${{ matrix.rust_target }}/release/${{ matrix.cargo_artifact }}"
          New-Item -ItemType Directory -Force -Path prebuild-out | Out-Null
          Copy-Item $src "prebuild-out/$outName"
          $hash = (Get-FileHash -Algorithm SHA256 "prebuild-out/$outName").Hash.ToLower()
          # GNU sha256sum-compatible format: "<hex>  <filename>"
          "$hash  $outName" | Out-File -FilePath "prebuild-out/$outName.sha256" -Encoding ascii -NoNewline
          Get-ChildItem prebuild-out

      - name: Upload as workflow artifact (PR runs)
        if: steps.guard.outputs.skip != 'true' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuild-out/*
          if-no-files-found: error
          retention-days: 7

      - name: Attach to GitHub Release
        if: steps.guard.outputs.skip != 'true' && (github.event_name == 'release' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          fail_on_unmatched_files: true
          files: |
            prebuild-out/mochi_net-${{ matrix.target }}.${{ matrix.ext }}
            prebuild-out/mochi_net-${{ matrix.target }}.${{ matrix.ext }}.sha256
