# Release workflow — Changesets-driven publish to npm with OIDC provenance.
#
# Required repository secrets (configure in Settings → Secrets and variables → Actions):
#   - NPM_TOKEN: an npm automation token with publish access to the @mochi.js scope.
#                Provenance signing is handled by GitHub's OIDC issuer at runtime;
#                no additional secret is needed for the signature itself.
#
# How it works:
#   - On push to main, changesets/action@v1 inspects pending .changeset/*.md files.
#   - If any are present, the action opens (or updates) a "Version Packages" PR
#     that runs `bun run version-packages`, bumping versions + writing CHANGELOGs.
#   - When that PR is merged, this workflow runs again, sees no pending changesets,
#     and instead invokes `bun run release` (= bun run build && changeset publish)
#     which publishes each updated package to npm with OIDC-signed provenance.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version PR or publish
    # Self-hosted (chaser-runner). Linux/x64 — same gate workload as
    # pr-fast.yml, plus the Trusted-Publishing OIDC exchange to npm.
    # OIDC works on self-hosted runners identically (id-token: write
    # populates ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN regardless of runner
    # provider). NPM provenance signing is sigstore — also runner-agnostic.
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      # Set up Node + npm to a version that handles sigstore signing under
      # OpenSSL 3 cleanly. Without this, `changeset publish` fails with
      # ERR_OSSL_NO_DEFAULT_DIGEST during provenance signing — npm <10.5 hit
      # OpenSSL 3's strict-default-digest path. The 'npm install -g npm@latest'
      # ensures we're on a version where @sigstore/sign was rewritten to load
      # the legacy provider explicitly. Bun stays the runtime for everything
      # else; npm is only invoked transitively by `changeset publish` to do
      # the actual `npm publish` HTTP upload.
      - name: Setup Node + pinned npm for sigstore-compatible publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Pin npm to a sigstore-compatible version
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      # Cache + install Chromium-for-Testing so the MOCHI_E2E-gated
      # conformance steps below have a real binary to drive. Same pattern
      # as pr-fast.yml.
      - name: Cache Chromium-for-Testing
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: ~/.mochi/browsers
          key: chromium-for-testing-linux-${{ runner.os }}-v1
      # System deps Chromium needs to launch on Linux — same list as pr-fast.yml.
      - name: Install Chromium runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 \
            libatk1.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 \
            libgbm1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 \
            libpangocairo-1.0-0 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 \
            libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 \
            libxrender1 libxss1 libxtst6 xdg-utils
      # Same install + path-resolution pattern as pr-fast.yml.
      - name: Install Chromium-for-Testing (mochi browsers install — idempotent)
        run: bun packages/cli/src/bin.ts browsers install
      - name: Resolve Chromium binary path
        run: |
          set -euo pipefail
          BINARY=$(find ~/.mochi/browsers -type f -name chrome -perm -u+x 2>/dev/null | head -1 || true)
          if [ -z "$BINARY" ]; then
            echo "::error::No Chromium binary found under ~/.mochi/browsers/. Tree:"
            find ~/.mochi/browsers -maxdepth 4 -type f 2>/dev/null | head -20 || echo "(missing)"
            ls -la ~/.mochi/browsers/ 2>/dev/null || true
            exit 1
          fi
          echo "Found Chromium at: $BINARY"
          echo "MOCHI_CHROMIUM_PATH=$BINARY" >> "$GITHUB_ENV"
          echo "::group::Chromium --version smoke"
          "$BINARY" --version
          echo "::endgroup::"

      # Pre-publish conformance gates — v1.0 release blocks on these.
      # PLAN.md I-7 ("the harness is the gate"). Publish is blocked unless
      # all three pass — with documented expected-failures from
      # docs/limits.md the only allowed exceptions on the online run.
      # The existing Probe Manifest harness:diff gate remains in PR-fast.
      - name: Conformance gate — humanize (offline)
        env:
          MOCHI_E2E: "1"
          # See pr-fast.yml: --no-sandbox is the GH-runner workaround,
          # acceptable in conformance because we test "does mochi work",
          # not "does this look real to a fingerprinter".
          MOCHI_EXTRA_ARGS: "--no-sandbox"
        run: bun run conformance:humanize

      - name: Conformance gate — stealth Layer 1 (offline)
        env:
          MOCHI_E2E: "1"
          MOCHI_EXTRA_ARGS: "--no-sandbox"
        run: bun run conformance:stealth

      - name: Conformance gate — stealth Layer 2 (online)
        env:
          MOCHI_E2E: "1"
          MOCHI_ONLINE: "1"
          MOCHI_EXTRA_ARGS: "--no-sandbox"
          # Residential proxy forwarded to the harness via MOCHI_PROXY (task
          # 0160). The harness's `launchSharedSession` consumes it and feeds
          # `mochi.launch({ proxy })` so the live runs egress from a non-DC
          # IP — the GH-runner IP gets rate-limited / anti-bot escalated by
          # bot.incolumitas.com. Empty / missing = unproxied (fork PRs).
          # IMPORTANT: do NOT echo this value anywhere — GitHub auto-masks
          # it, but defense-in-depth.
          MOCHI_PROXY: ${{ secrets.HTTP_PROXY }}
        run: bun run conformance:stealth:online

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore(repo): version packages"
          title: "chore(repo): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN intentionally NOT set — the @mochi.js org requires
          # Trusted Publishing (OIDC). When NPM_TOKEN is absent, changesets/
          # action skips writing it to .npmrc, and npm CLI 11.x auto-detects
          # the GH OIDC env vars (ACTIONS_ID_TOKEN_REQUEST_URL +
          # ACTIONS_ID_TOKEN_REQUEST_TOKEN, populated by `id-token: write`
          # at the workflow level) and exchanges them for a short-lived
          # registry credential. The exchange is only accepted when npmjs.com
          # has a Trusted Publisher rule registered for this exact
          # (org, repo, workflow_file, environment) tuple.
          #
          # If publish 404s here, the most likely cause is a missing or
          # mismatched Trusted Publisher entry on npm — verify each package's
          # Trusted Publisher rule names workflow `release.yml` (NOT
          # `Release`) and the correct GitHub owner/repo.
          NPM_CONFIG_PROVENANCE: "true"
