[package]
name = "mochi-net"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Network impersonation FFI for mochi — wraps wreq behind a stable C ABI for Bun:FFI."

[lib]
name = "mochi_net"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Phase 0.6 — see PLAN.md §10. `wreq` is the Apache-2.0 HTTP client with
# fingerprint-extension primitives. We do NOT depend on `wreq-util`
# (GPL-3.0/LGPL-3.0 — incompatible with PLAN.md I-2). Chrome-style
# `EmulationProvider` profiles are authored in-tree under `ffi/preset.rs`.
wreq = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
