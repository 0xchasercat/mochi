# Pinned Rust toolchain for the @mochi.js/net-rs cdylib build.
#
# Targets enumerate the 5 cross-compile targets the build-prebuilds workflow
# emits per published @mochi.js/net-rs release tag (PLAN.md §14, phase 0.10).
# `stable` is intentional — wreq + BoringSSL track stable-only; nightly drift
# would force a Cargo.lock churn we don't want.
#
# `components` matches the Rust default toolchain set used by
# `dtolnay/rust-toolchain@stable` in CI (rustfmt + clippy).

[toolchain]
channel = "stable"
profile = "minimal"
components = ["rustfmt", "clippy"]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
